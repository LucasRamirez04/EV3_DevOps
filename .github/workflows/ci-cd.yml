name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo fuente
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    # Unificamos compilación, pruebas y análisis en un solo comando eficiente
    - name: Compilar, Probar y Analizar con SonarCloud
      continue-on-error: true
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=LucasRamirez04_EV3_DevOps \
          -Dsonar.organization=lucasramirez04 \
          -Dsonar.host.url=https://sonarcloud.io


    # Automatizar desplieque
    - name: Configurar QEMU y Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Nota: En entornos reales aquí iniciarías sesión en Docker Hub con secretos
    - name: Construir Imagen Docker del Microservicio
      run: |
        docker build -t lucasramirez04/springboot-app-devops:latest .

    - name: Simular Despliegue en Kubernetes Cluster
      run: |
        echo "Conectando al clúster de Kubernetes..."
        echo "Aplicando manifiestos de la carpeta k8s..."
        echo "kubectl apply -f k8s/deployment.yaml"
        echo "kubectl apply -f k8s/service.yaml"
        echo "¡Despliegue continuo ejecutado con éxito!"