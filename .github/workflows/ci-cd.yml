name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo fuente
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Crucial para SonarCloud

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar y Ejecutar Pruebas con Maven
      run: mvn clean test

    # Análisis real en la nube conectando GitHub con SonarCloud pasándole el token directamente a Maven
    - name: Analisis de Calidad con SonarCloud
      run: |
        mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=LucasRamirez04_EV3_DevOps \
          -Dsonar.organization=lucasramirez04 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}