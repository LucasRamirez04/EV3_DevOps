name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo fuente
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Crucial para que SonarQube pueda leer el historial de Git

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar y Ejecutar Pruebas con Maven
      run: mvn clean test

    # Aquí ejecutamos el Paso 6: Mandar el reporte a tu SonarQube usando el Token guardado
    - name: Analisis de Calidad con SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=springboot-app-devops