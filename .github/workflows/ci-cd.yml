name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo fuente
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    # Unificamos compilación, pruebas y análisis en un solo comando eficiente
    - name: Compilar, Probar y Analizar con SonarCloud
      continue-on-error: true
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=LucasRamirez04_EV3_DevOps \
          -Dsonar.organization=lucasramirez04 \
          -Dsonar.host.url=https://sonarcloud.io