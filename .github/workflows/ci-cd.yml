name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo fuente
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Crucial para SonarCloud

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    #Compila, prueba y manda a SonarCloud usando tu variable secreta de forma nativa
    - name: Compilar, Probar y Analizar con SonarCloud
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=LucasRamirez04_EV3_DevOps \
          -Dsonar.organization=lucasramirez04 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=$SONAR_TOKEN

    #AUTOMATIZAR Y SUBIR A DOCKER HUB (Tu bodega en la nube)
    - name: Iniciar sesion en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Configurar QEMU y Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Construir y Subir Imagen a Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/springboot-app-devops:latest